---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@6.0.0
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - default
        os:
          - almalinux-9
          - amazonlinux-2023
          - centos-stream-9
          - debian-12
          - fedora-latest
          - oraclelinux-9
          - rockylinux-9
          - ubuntu-2404

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@6.0.0

      - name: Run Kitchen
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        run: kitchen test ${{ matrix.suite }}-${{ matrix.os }} --destroy=always

      - name: Print debug output on failure
        if: failure()
        env:
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        run: kitchen exec ${{ matrix.suite }}-${{ matrix.os }} -c "journalctl -l"
